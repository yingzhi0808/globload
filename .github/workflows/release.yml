name: Release Package

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install pnpm and dependencies
        uses: pnpm/action-setup@v3
        with:
          run_install: true

      - name: Build package
        run: pnpm build

      - name: Publish to npm and create GitHub Release using release-it
        run: |
          pnpm release-it --ci \
            --no-increment \
            --github.release \
            --npm.publish \
            --npm.provenance
